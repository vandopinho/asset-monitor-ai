services:
  postgres:
    image: postgres:17
    container_name: asset-monitor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: asset_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: